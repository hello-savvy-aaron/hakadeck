<!-- @dsCard group="Patterns" name="Low-friction lead capture" subtitle="Call-first, single contact field" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Haka Decks — Lead capture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --teal: #729b79;
        --ink: #22302a;
        --smoke: #f3f0f0;
        --charcoal: #586860;
        --border: rgb(34 48 42 / 14%);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 48px;
        background: var(--smoke);
        color: var(--ink);
        font-family: "Inter", system-ui, sans-serif;
      }
      .wrap {
        max-width: 520px;
        margin: 0 auto;
      }
      h1 {
        font-family: "Bricolage Grotesque", system-ui, sans-serif;
        font-weight: 500;
        letter-spacing: -0.02em;
        font-size: 44px;
        line-height: 1.02;
        margin: 0;
      }
      .lead {
        font-size: 18px;
        line-height: 1.5;
        color: rgb(34 48 42 / 70%);
        margin: 16px 0 32px;
      }
      .card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 1px 3px rgb(34 48 42 / 8%);
      }
      .call {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 18px;
        border-radius: 12px;
        background: var(--teal);
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        text-decoration: none;
      }
      .call svg {
        width: 20px;
        height: 20px;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 24px 0;
        color: var(--charcoal);
        font-size: 14px;
        font-weight: 500;
      }
      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        flex: 1;
        background: var(--border);
      }
      input,
      textarea {
        width: 100%;
        font-family: inherit;
        font-size: 16px;
        color: var(--ink);
        background: #fff;
        border: 1px solid rgb(34 48 42 / 18%);
        border-radius: 10px;
        padding: 0 16px;
      }
      input {
        height: 56px;
      }
      textarea {
        padding: 14px 16px;
        resize: vertical;
        margin-top: 14px;
      }
      input::placeholder,
      textarea::placeholder {
        color: var(--charcoal);
      }
      button {
        width: 100%;
        height: 56px;
        margin-top: 14px;
        border: 0;
        border-radius: 10px;
        background: var(--teal);
        color: #fff;
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .foot {
        text-align: center;
        font-size: 14px;
        color: var(--charcoal);
        margin-top: 24px;
      }
      .foot a {
        color: var(--ink);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Talk to Pete.</h1>
      <p class="lead">Call now, or leave your number and he'll get back to you.</p>

      <div class="card">
        <a class="call" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Call Pete — 720-589-5680
        </a>

        <div class="divider">or have Pete reach out</div>

        <input type="text" placeholder="Your phone number or email" />
        <textarea rows="3" placeholder="What are you thinking? (optional)"></textarea>
        <button type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          Send to Pete
        </button>
      </div>

      <p class="foot">
        Serving Centennial &amp; the south Denver metro · Prefer email?
        <a href="#">pete@hakadecks.com</a>
      </p>
    </div>
  </body>
</html>
